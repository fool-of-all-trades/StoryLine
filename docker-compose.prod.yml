services:
  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
    volumes:
      - uploads-data:/app/public/uploads:ro
    depends_on:
      - php
    networks:
      - edge
      - app-internal
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /app
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: "${POSTGRES_DB:?set POSTGRES_DB}"
      DB_USER: "${POSTGRES_USER:?set POSTGRES_USER}"
      DB_PASS: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
      APP_IP_SALT: "${APP_IP_SALT:?set APP_IP_SALT}"
      PUBLIC_LAUNCH_DATE: "${PUBLIC_LAUNCH_DATE:-2026-05-15}"
      APP_LOG_PATH: /app/var/log/app.log
      QUOTES_LOCAL_PATH: /app/database/quotes.json
      APP_ENV: "${APP_ENV:-production}"
      APP_BASE_URL: "${APP_BASE_URL:?set APP_BASE_URL}"
      MAIL_HOST: "${MAIL_HOST:?set MAIL_HOST}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:?set MAIL_FROM_ADDRESS}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-StoryLine}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION:-tls}"
    volumes:
      - uploads-data:/app/public/uploads
      - var-data:/app/var
    depends_on:
      - db
    networks:
      - app-internal
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?set POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER:?set POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-internal
    restart: unless-stopped

networks:
  edge:
  app-internal:
    internal: true

volumes:
  pg-data:
  uploads-data:
  var-data:
